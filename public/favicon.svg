        stroke="#FF7A00" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Sparkle top-right -->
  <line x1="50" y1="8" x2="50" y2="16" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="46" y1="12" x2="54" y2="12" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Sparkle small left -->
  <line x1="12" y1="15" x2="12" y2="20" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="9.5" y1="17.5" x2="14.5" y2="17.5" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
</svg>

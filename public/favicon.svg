<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF9A2E"/>
      <stop offset="1" stop-color="#FF5C00"/>
    </linearGradient>
    <linearGradient id="bag" x1="10" y1="20" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFBE3D"/>
      <stop offset="1" stop-color="#FF7A00"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Bag body -->
  <rect x="12" y="26" width="40" height="28" rx="5" fill="white" opacity="0.95"/>

  <!-- Bag handle -->
  <path d="M22 26V21C22 15.477 26.477 11 32 11C37.523 11 42 15.477 42 21V26"
        stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Smile -->
